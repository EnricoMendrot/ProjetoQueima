{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Plataforma</title>
    <link rel="stylesheet" href="{% static 'css/cadastro/cadastro.css' %}">
</head>
<body>

    <div class="container">
        <div class="form-box">
            <h1>Cadastro de Plataforma</h1>
            <p class="subtitle">Inserir Informações</p>

            <form method="POST" action="">
                {% csrf_token %}

                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome_plataforma">Nome da Plataforma:</label>
                        <input type="text" id="nome_plataforma" name="nome_plataforma" required>
                    </div>

                    <div class="form-group">
                        <label for="localizacao">Localização:</label>
                        <input type="text" id="localizacao" name="localizacao" required>
                    </div>

                    <div class="form-group">
                        <label for="tipo">Tipo:</label>
                        <select id="tipo" name="tipo">
                            <option value="">Selecione</option>
                            <option>Plataforma de Produção</option>
                            <option>Plataforma de Perfuração</option>
                            <option>FPSO</option>
                            <option>Outros</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="data_comissionamento">Data de Comissionamento:</label>
                        <input type="date" id="data_comissionamento" name="data_comissionamento">
                    </div>

                    <div class="form-group">
                        <label for="data_inspecao">Data da Última Inspeção:</label>
                        <input type="date" id="data_inspecao" name="data_inspecao">
                    </div>

                    <div class="form-group">
                        <label for="status">Status:</label>
                        <select id="status" name="status">
                            <option value="">Selecione</option>
                            <option>Ativa</option>
                            <option>Em Manutenção</option>
                            <option>Inativa</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="operador_principal">Operador Principal:</label>
                        <input type="text" id="operador_principal" name="operador_principal">
                    </div>

                    <div class="form-group">
                        <label for="supervisor">Supervisor:</label>
                        <input type="text" id="supervisor" name="supervisor">
                    </div>

                    <div class="form-group">
                        <label for="equipe_manutencao">Equipe de Manutenção:</label>
                        <input type="text" id="equipe_manutencao" name="equipe_manutencao">
                    </div>

                    <div class="form-group">
                        <label for="responsavel_tecnico">Responsável Técnico:</label>
                        <input type="text" id="responsavel_tecnico" name="responsavel_tecnico">
                    </div>
                </div>

                <div class="form-group full">
                    <label for="observacoes">Observações:</label>
                    <textarea id="observacoes" name="observacoes" rows="5"></textarea>
                </div>

                <div class="button-box">
                    <button type="submit" class="btn-cadastrar">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
