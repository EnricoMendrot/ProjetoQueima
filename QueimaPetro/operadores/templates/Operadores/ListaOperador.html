{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores Cadastrados</title>
    <link rel="stylesheet" href="{% static 'Operadores/ListaOperador.css' %}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Operadores Cadastrados</h1>
            <p class="subtitulo">Visualizar Operadores</p>
        </div>

        <div class="filter-box">
            <form method="GET" action="">
                <div class="filter-row">
                    <div class="filter-item">
                        <label>Pesquisar Operador:</label>
                        <div class="search-box">
                            <input type="text" name="busca" placeholder="Digite o nome do operador">
                            <button type="submit" class="search-btn">🔍</button>
                        </div>
                    </div>

                    <div class="filter-item">
                        <label>Setor:</label>
                        <select name="setor">
                            <option value="">Todos</option>
                            <option>Queima de Gases</option>
                            <option>Produção</option>
                            <option>Manutenção</option>
                        </select>
                    </div>

                    <div class="filter-item">
                        <label>Turno:</label>
                        <select name="turno">
                            <option value="">Todos</option>
                            <option>Matutino</option>
                            <option>Vespertino</option>
                            <option>Noturno</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th></th>
                        <th>ID</th>
                        <th>Nome do Operador</th>
                        <th>Setor</th>
                        <th>Turno</th>
                    </tr>
                </thead>
                <tbody>
                    {% for operador in funcionario %}
                    <tr>
                        <td><input type="checkbox"></td>
                        <td>{{ operador.ID_Funcionario }}</td>
                        <td>{{ operador.Nome }}</td>
                        <td>{{ operador.Setor }}</td>
                        <td>{{ operador.Turno }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="empty">Nenhum operador encontrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
