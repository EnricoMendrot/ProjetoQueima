{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Operador</title>
    <link rel="stylesheet" href="{% static 'Operadores/Cadastro.css' %}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Cadastro de Operador</h1>
            <p class="subtitulo">Visualizar informações</p>
        </div>

        <div class="form-box">
            <form method="POST" action="">
                {% csrf_token %}

                <div class="form-row">
                    <label>Nome:</label>
                    {{ form.Nome }}

                    <label>Cargo:</label>
                    {{ form.Cargo }}
                </div>

                <div class="form-row">
                    <label>Email:</label>
                    {{ form.Email }}

                    <label>Telefone:</label>
                    {{ form.Telefone }}
                </div>

                <div class="form-row">
                    <label>CPF:</label>
                    {{ form.CPF }}

                    <label>Turno:</label>
                    {{ form.Turno }}
                </div>

                <div class="form-row">
                    <label>Empresa:</label>
                    {{ form.Empresa }}

                    <label>Setor:</label>
                    {{ form.Setor }}
                </div>

                <div class="form-row">
                    <label>Matrícula:</label>
                    {{ form.Matricula }}

                    <label>Plataforma:</label>
                    {{ form.ID_Plataforma }}
                </div>

                <div class="buttons">
                    <button type="submit" class="btn">Enviar</button>
                    <a href="#" class="btn-voltar">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
