{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Base{% endblock %}</title>
  
  <!-- CSS -->

      <!-- PERFIL -->
      <div class="info-box" onclick="window.location.href='{% url 'operadores:perfil' %}'">
        <p><strong>NOME:</strong><br>RAFAEL MONTEIRO DA SILVA</p>
        <p><strong>FUNÇÃO:</strong><br>ANALISTA DE DADOS JÚNIOR</p>
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
            <path d="M18 0C20.3869 0 22.6761 0.948211 24.364 2.63604C26.0518 4.32387 27 6.61305 27 9C27 11.3869 26.0518 13.6761 24.364 15.364C22.6761 17.0518 20.3869 18 18 18C15.6131 18 13.3239 17.0518 11.636 15.364C9.94821 13.6761 9 11.3869 9 9C9 6.61305 9.94821 4.32387 11.636 2.63604C13.3239 0.948211 15.6131 0 18 0ZM18 22.5C27.945 22.5 36 26.5275 36 31.5V36H0V31.5C0 26.5275 8.055 22.5 18 22.5Z" />
          </svg>
        </div>
      </div>

      <!-- ÍCONES DO SUBMENU -->
      <!-- Cole aqui todos os <button class="menu-item"> que você já tem (HOME, RELATÓRIOS, etc.) -->

      <!-- MENU CADASTROS -->
      <div class="menu-cadastros">
        <!-- Todo o código do botão CADASTROS e sub-botões -->
      </div>
    </div> 

  </div>

  <!-- CONTEÚDO PRINCIPAL DA PÁGINA (herdado) -->
  {% block content %}
  {% endblock %}

  <!-- JS do submenu -->
  <script src="{% static 'js/SubMenu.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>

</html>
