{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Equipamento</title>
    <link rel="stylesheet" href="{% static '/Cadastro/CadastroEquipamento.css' %}">
</head>
<body>
    <div class="page-container">
        <div class="header">
            <h1>Equipamento Cadastrado</h1>
            <p class="subtitle">Visualizar Equipamento</p>
            <button class="btn-voltar" onclick="window.history.back()">Voltar</button>
        </div>

        <div class="card">
            <form method="POST">
                {% csrf_token %}

                <div class="form-row">
                    <label for="{{ form.Nome.id_for_label }}">Nome do Equipamento:</label>
                    {{ form.Nome }}
                </div>

                <div class="form-row">
                    <label for="{{ form.Fabricante.id_for_label }}">Fabricante:</label>
                    {{ form.Fabricante }}
                </div>

                <div class="form-row-inline">
                    <div>
                        <label for="{{ form.Tipo.id_for_label }}">Tipo:</label>
                        {{ form.Tipo }}
                    </div>
                    <div>
                        <label for="{{ form.Plataforma.id_for_label }}">Plataforma:</label>
                        {{ form.Plataforma }}
                    </div>
                </div>

                <div class="form-row-inline">
                    <div>
                        <label for="{{ form.Status_Operacional.id_for_label }}">Status Operacional:</label>
                        {{ form.Status_Operacional }}
                    </div>
                    <div>
                        <label for="{{ form.Funcionario.id_for_label }}">Funcionário:</label>
                        {{ form.Funcionario }}
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-editar">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
