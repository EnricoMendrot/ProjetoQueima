{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Equipamento</title>
    <link rel="stylesheet" href="{% static 'VisualizacaoID/visualizacaoid.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Equipamento Cadastrado</h1>
            <p class="subtitle">Visualizar Equipamento</p>
            <a href="{% url 'equipamentos:visualizacao' %}" class="btn-voltar">Voltar</a>
        </header>

        <main>
            <div class="card">
                <form>
                    <div class="form-grid">
                        <div class="campo">
                            <label>Nome do Equipamento:</label>
                            <input type="text" value="{{ equipamento.Nome }}" readonly>
                        </div>
                        <div class="campo">
                            <label>Fabricante:</label>
                            <input type="text" value="{{ equipamento.Fabricante }}" readonly>
                        </div>
                        <div class="campo">
                            <label>Código de Equipamento:</label>
                            <input type="text" value="{{ equipamento.Codigo }}" readonly>
                        </div>
                        <div class="campo">
                            <label>Plataforma:</label>
                            <input type="text" value="{{ equipamento.Plataforma }}" readonly>
                        </div>
                        <div class="campo">
                            <label>Status:</label>
                            <select disabled>
                                <option selected>{{ equipamento.Status_Operacional }}</option>
                            </select>
                        </div>
                        <div class="campo">
                            <label>N° Patrimônio:</label>
                            <input type="text" value="{{ equipamento.Numero_Patrimonio }}" readonly>
                        </div>
                    </div>

                    <div class="observacoes">
                        <label>Observações:</label>
                        <textarea readonly>{{ equipamento.Observacoes }}</textarea>
                    </div>

                    <div class="botoes">
                        <button type="button" class="btn-editar">Editar</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
